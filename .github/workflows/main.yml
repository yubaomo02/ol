name: Zubo Daily SpeedTest
on:

  workflow_dispatch:      # 允许手动在页面点击运行

permissions:
  contents: write         # 必须有这个权限才能 push 文件

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install httpx

      - name: Run SpeedTest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 运行刚才写的脚本
        run: python py/zubo_speedtest.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 关键点：使用 -A 确保把所有新建的 txt 和 m3u 都加进去
          git add zubo_live.txt zubo_live.m3u
          
          # 检查是否有文件变化，防止在没有更新时报错导致任务显示失败
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Auto Update: Gathered Live List"
          git push
